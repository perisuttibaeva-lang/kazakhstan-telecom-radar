name: Update telecom news archive

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh archive
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\start-radar.ps1 -UpdateOnce

      - name: Commit archive
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/archive.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update telecom news archive"
            git push
          }
